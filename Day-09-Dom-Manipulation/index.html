<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 9 - DOM Manipulation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Student Management Dashboard</h1>
<div id="studentCard">

            Department : CSE
</p>

</p>
